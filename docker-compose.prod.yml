# miniPC / self-hosted production
# Usage:
#   cp .env.prod.sample .env  # 編集して実際の値を入れる
#   docker compose -f docker-compose.prod.yml up -d --build
#
# TLS: Cloudflare Tunnel が処理。CLOUDFLARE_TUNNEL_TOKEN を .env に設定すること。
# Migration: 初回または schema 変更後に一度だけ migrate サービスを実行
#   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://backend:${BACKEND_DATABASE_PASSWORD}@db:5432/backend_production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_CLOUDFRONT_BASE_URL: ${NEXT_PUBLIC_CLOUDFRONT_BASE_URL}
        NEXT_PUBLIC_S3_HOSTNAME: ${NEXT_PUBLIC_S3_HOSTNAME:-}
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:3000/api
    depends_on:
      - backend
    networks:
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: ${BACKEND_DATABASE_PASSWORD}
      POSTGRES_DB: backend_production
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend_production"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - frontend
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://backend:${BACKEND_DATABASE_PASSWORD}@db:5432/backend_production
    command: ["./bin/rails", "db:prepare"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - migrate

volumes:
  db_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
