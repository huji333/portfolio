name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  RAILS_ENV: test

jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.5'
          bundler-cache: true
          working-directory: backend

      - name: Get changed Ruby files
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(git diff --name-only --diff-filter=d origin/${{ github.base_ref }}...HEAD -- 'backend/**/*.rb' | sed 's|^backend/||' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "any=$([ -n "$FILES" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Run rubocop (changed files only)
        if: github.event_name == 'pull_request' && steps.changed.outputs.any == 'true'
        working-directory: ./backend
        run: bundle exec rubocop --force-exclusion ${{ steps.changed.outputs.files }}

      - name: Run rubocop (full)
        if: github.event_name == 'push'
        working-directory: ./backend
        run: bundle exec rubocop

  rspec:
    runs-on: ubuntu-latest
    needs: rubocop
    env:
      PGHOST: 127.0.0.1
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: portfolio_test
      CLOUDFRONT_BASE_URL: ${{ secrets.CLOUDFRONT_BASE_URL }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.5'
          bundler-cache: true
          working-directory: backend

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Setup test database
        working-directory: ./backend
        run: bundle exec rails db:prepare

      - name: Run tests
        working-directory: ./backend
        run: bundle exec rspec
